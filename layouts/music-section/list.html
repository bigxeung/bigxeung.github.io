{{ define "main" }}
<style>
    body {
        font-family: 'Helvetica Neue', Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background-color: #121212;
        background-image: radial-gradient(circle, #333 0%, #121212 70%);
        color: #eee;
        margin: 0;
        padding: 20px;
        box-sizing: border-box;
    }

    .player-container {
        background-color: #1e1e1e;
        border-radius: 15px;
        padding: 25px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7), 0 0 15px rgba(0, 0, 0, 0.5);
        width: 350px;
        position: relative;
        overflow: hidden;
        border: 1px solid #444;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    h1 {
        color: #007bff;
        margin-bottom: 25px;
        font-weight: 300;
        letter-spacing: 1px;
    }

    .lp-container {
        width: 220px;
        height: 220px;
        margin-bottom: 25px; /* Replaced margin: 0 auto */
        position: relative;
        background-color: #111;
        border-radius: 50%;
        border: 8px solid #0d0d0d;
        overflow: hidden;
        box-shadow: inset 0 0 15px rgba(0,0,0,0.9);
    }

    .lp-image {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        object-fit: cover;
        animation: rotate 10s linear infinite paused;
    }

    .lp-container::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 45px;
        height: 45px;
        background-color: #007bff;
        border-radius: 50%;
        border: 3px solid #fff;
        z-index: 10;
        box-shadow: 0 0 10px rgba(0, 123, 255, 0.5);
    }

    .lp-image.playing {
        animation-play-state: running;
    }

    @keyframes rotate {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }

    .controls {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 20px;
        margin-bottom: 25px;
    }

    .controls button {
        background-color: #007bff;
        color: white;
        border: none;
        padding: 12px 24px;
        border-radius: 50px;
        cursor: pointer;
        font-size: 16px;
        font-weight: bold;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(0, 123, 255, 0.3);
    }

    .controls button:hover {
        background-color: #0056b3;
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(0, 123, 255, 0.4);
    }

    #currentSong {
        margin-top: 20px;
        font-size: 1.2em;
        color: #007bff;
        font-weight: 500;
    }

    #playlist-container {
        margin-top: 25px;
        max-height: 220px;
        overflow-y: auto;
        border-top: 1px solid #333;
        padding-top: 15px;
    }

    .playlist-item {
        padding: 12px 15px;
        cursor: pointer;
        text-align: left;
        transition: background-color 0.2s ease;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-radius: 5px;
    }

    .playlist-item:hover {
        background-color: #2a2a2a;
    }

    .playlist-item.active {
        background-color: #007bff;
        color: white;
        font-weight: bold;
    }

    .playlist-item-title {
        flex-grow: 1;
    }

    .play-indicator {
        width: 10px;
        height: 10px;
        background-color: #fff;
        border-radius: 50%;
        margin-left: 10px;
        display: none;
        animation: pulse 1.5s infinite ease-in-out;
    }

    .playlist-item.active .play-indicator {
        display: block;
    }

    @keyframes pulse {
        0% { transform: scale(0.8); opacity: 0.7; }
        50% { transform: scale(1); opacity: 1; }
        100% { transform: scale(0.8); opacity: 0.7; }
    }
</style>

<div class="player-container">
    <h1>{{ .Title }}</h1>

    <div class="lp-container">
        <img src="/images/lp_record.png" alt="LP Record" class="lp-image" id="lpImage">
    </div>

    <div class="controls">
        <button id="prevBtn">이전</button>
        <button id="playPauseBtn">재생</button>
        <button id="nextBtn">다음</button>
    </div>

    <audio id="audioPlayer" controls style="width: 100%; margin-top: 15px; display: none;"></audio>
    <div id="currentSong">재생 중: 없음</div>

    <div id="playlist-container">
        <h3>재생 목록</h3>
        <ul id="playlist">
        </ul>
    </div>
</div>

<script>
    const audioPlayer = document.getElementById('audioPlayer');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const playlistElement = document.getElementById('playlist');
    const currentSongDisplay = document.getElementById('currentSong');
    const lpImage = document.getElementById('lpImage');

    let currentSongIndex = 0;
    let isPlaying = false;

    const audioFileNames = [
        {{ range .Resources.Match "*.mp3" }}
            "{{ .Name }}",
        {{ end }}
    ];
    const audioFileUrls = [
        {{ range .Resources.Match "*.mp3" }}
            "{{ .RelPermalink }}",
        {{ end }}
    ];

    function createPlaylist() {
        playlistElement.innerHTML = '';
        audioFileNames.forEach((file, index) => {
            const listItem = document.createElement('li');
            listItem.classList.add('playlist-item');
            listItem.dataset.index = index;
            listItem.innerHTML = `<span class="playlist-item-title">${file.replace('.mp3', '')}</span><span class="play-indicator"></span>`;
            listItem.addEventListener('click', () => playSong(index));
            playlistElement.appendChild(listItem);
        });
    }

    function playSong(index) {
        if (index >= 0 && index < audioFileUrls.length) {
            currentSongIndex = index;
            audioPlayer.src = audioFileUrls[currentSongIndex];
            currentSongDisplay.textContent = "재생 중: " + audioFileNames[currentSongIndex].replace('.mp3', '');

            audioPlayer.play();
            isPlaying = true;
            playPauseBtn.textContent = '일시정지';
            lpImage.classList.add('playing');
            updatePlaylistActiveState();
        }
    }

    function togglePlayPause() {
        if (isPlaying) {
            audioPlayer.pause();
            playPauseBtn.textContent = '재생';
            lpImage.classList.remove('playing');
        } else {
            if (!audioPlayer.src) {
                playSong(currentSongIndex);
            } else {
                audioPlayer.play();
                playPauseBtn.textContent = '일시정지';
                lpImage.classList.add('playing');
            }
        }
        isPlaying = !isPlaying;
    }

    function playNext() {
        currentSongIndex = (currentSongIndex + 1) % audioFileUrls.length;
        playSong(currentSongIndex);
    }

    function playPrev() {
        currentSongIndex = (currentSongIndex - 1 + audioFileUrls.length) % audioFileUrls.length;
        playSong(currentSongIndex);
    }

    function updatePlaylistActiveState() {
        const listItems = playlistElement.querySelectorAll('.playlist-item');
        listItems.forEach((item, index) => {
            if (index === currentSongIndex) {
                item.classList.add('active');
                item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            } else {
                item.classList.remove('active');
            }
        });
    }

    playPauseBtn.addEventListener('click', togglePlayPause);
    prevBtn.addEventListener('click', playPrev);
    nextBtn.addEventListener('click', playNext);
    audioPlayer.addEventListener('ended', playNext);

    document.addEventListener('DOMContentLoaded', () => {
        if (audioFileUrls.length === 0) {
            currentSongDisplay.textContent = "오디오 파일이 없습니다.";
            playPauseBtn.disabled = true;
            prevBtn.disabled = true;
            nextBtn.disabled = true;
        } else {
            createPlaylist();
            currentSongDisplay.textContent = "재생 대기: " + audioFileNames[currentSongIndex].replace('.mp3', '');
            updatePlaylistActiveState();
        }
    });
</script>
{{ end }}
